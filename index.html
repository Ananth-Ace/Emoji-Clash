<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <title>Emoji Clash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    canvas { touch-action: none; display: block; }

    /* ── Loading Screen ─────────────────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1e2a5e 0%, #0d1b3e 50%, #05080f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.6s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .load-title {
      font-size: clamp(28px, 7vw, 56px);
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 20px #cc5500, 0 0 40px #cc550066;
      letter-spacing: 3px;
      margin-bottom: 8px;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .load-emojis {
      font-size: clamp(32px, 9vw, 64px);
      margin: 12px 0 28px;
      animation: bounce 0.8s ease-in-out infinite alternate;
    }

    .load-bar-wrap {
      width: min(320px, 70vw);
      height: 10px;
      background: #1a1a3a;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #2244aa;
    }

    .load-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4fc3f7, #ffd700);
      border-radius: 5px;
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px #ffd700aa;
    }

    .load-text {
      margin-top: 14px;
      color: #5577aa;
      font-size: 14px;
      letter-spacing: 1px;
    }

    @keyframes pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
    @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-8px)} }
  </style>
</head>
<body>

  <!-- Loading / Splash Screen -->
  <div id="loading-screen">
    <div class="load-title">EMOJI CLASH</div>
    <div class="load-emojis">⚔️ &nbsp; VS &nbsp; 🏯</div>
    <div class="load-bar-wrap"><div class="load-bar-fill" id="load-fill"></div></div>
    <div class="load-text" id="load-text">Loading...</div>
  </div>

  <script>
    // ── Phaser loader: try local build first, fallback to CDN ──────────
    const fill     = document.getElementById('load-fill');
    const loadText = document.getElementById('load-text');

    function setProgress(pct, msg) {
      fill.style.width = pct + '%';
      if (msg) loadText.textContent = msg;
    }

    function startGame() {
      setProgress(100, 'Ready!');
      setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
      }, 400);
    }

    function loadScript(src, onLoad, onError) {
      const s   = document.createElement('script');
      s.src     = src;
      s.onload  = onLoad;
      s.onerror = onError;
      document.body.appendChild(s);
    }

    function loadGameScripts(callback) {
      const scripts = [
        'constants.js',
        'audio.js',
        'MenuScene.js',
        'LevelSelectScene.js',
        'UpgradeScene.js',
        'GameScene.js',
        'GameOverScene.js',
        'game.js'
      ];
      let idx = 0;
      function next() {
        if (idx >= scripts.length) { callback(); return; }
        setProgress(40 + (idx / scripts.length) * 55, `Loading ${scripts[idx].split('/').pop()}...`);
        loadScript(scripts[idx++], next, next);
      }
      next();
    }

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    setProgress(5, 'Loading engine...');
    loadScript(
      'js/phaser.min.js',
      () => {
        setProgress(35, 'Engine loaded!');
        loadGameScripts(startGame);
      },
      () => {
        setProgress(10, 'Fetching from CDN...');
        loadScript(
          'https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js',
          () => {
            setProgress(35, 'Engine loaded!');
            loadGameScripts(startGame);
          },
          () => { loadText.textContent = '❌ Failed to load. Check internet connection.'; }
        );
      }
    );
  </script>

</body>
</html>
